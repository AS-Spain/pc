<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; }
#p {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial;
    font-size: 24px;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg {
    from { background: white; }
    to { background: black; }
}
#t { animation: col 0.1s infinite alternate; font-weight: bold; }
@keyframes col {
    from { color: red; }
    to { color: blue; }
}
.f { animation: flash 0.1s infinite alternate; font-size: 32px; }
@keyframes flash { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="p">
    <div id="t">YOU ARE AN IDIOT!</div>
    <div><span class="f">☺</span> <span class="f">☺</span> <span class="f">☺</span></div>
</div>
<audio autoplay loop src="https://www.myinstants.com/media/sounds/you-are-an-idiot.mp3"></audio>
</body>
</html>
