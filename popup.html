<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; cursor: pointer; }
#p {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg { from { background: white; } to { background: black; } }
#t { font-family: Arial; font-size: 20px; font-weight: bold; animation: col 0.1s infinite alternate; }
@keyframes col { from { color: red; } to { color: blue; } }
.f { font-size: 32px; animation: fl 0.1s infinite alternate; }
@keyframes fl { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="p">
    <div id="t">YOU ARE AN IDIOT!</div>
    <div><span class="f">&#9786;</span> <span class="f">&#9786;</span> <span class="f">&#9786;</span></div>
</div>
<audio autoplay loop src="yai.wav"></audio>
<script>
// cada popup abre otro cada 5 segundos usando su propio click
document.addEventListener('click', function() {
    window.open('popup.html', '_blank',
        'width=250,height=200,left=' + Math.floor(Math.random()*900) +
        ',top=' + Math.floor(Math.random()*600));
});

// intenta abrir uno nuevo cada vez que recibe foco
// esto funciona porque es interacción del usuario (volver a la ventana)
window.addEventListener('focus', function() {
    window.open('popup.html', '_blank',
        'width=250,height=200,left=' + Math.floor(Math.random()*900) +
        ',top=' + Math.floor(Math.random()*600));
});
</script>
</body>
</html>
