<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #fff; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-family: Arial;
    background: white; z-index: 9999;
  }
</style>
</head>
<body>
<div id="overlay">Click anywhere</div>
<script>
var base = 'https://AS-Spain.github.io/pc/';
document.addEventListener('click', function start() {
    document.getElementById('overlay').remove();
    var audio = new Audio(base + 'yai.mp3');
    audio.loop = true;
    audio.play();
    function spawnDiv() {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;width:300px;height:200px;' +
            'left:' + Math.floor(Math.random()*70) + '%;' +
            'top:' + Math.floor(Math.random()*70) + '%;' +
            'z-index:' + Math.floor(Math.random()*9999) + ';' +
            'background:white;';
        d.innerHTML = '<img src="' + base + 'yai.gif" style="width:100%;height:100%;">';
        document.body.appendChild(d);
    }
    setInterval(spawnDiv, 400);
}, { once: true });
</script>
</body>
</html>
