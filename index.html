<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; cursor: pointer; }
#main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg { from { background: white; } to { background: black; } }
#text { font-family: Arial; font-size: 36px; font-weight: bold; animation: col 0.1s infinite alternate; }
@keyframes col { from { color: red; } to { color: blue; } }
.f { font-size: 48px; animation: fl 0.1s infinite alternate; }
@keyframes fl { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="main">
    <div id="text">YOU ARE AN IDIOT!</div>
    <div><span class="f">&#9786;</span> <span class="f">&#9786;</span> <span class="f">&#9786;</span></div>
</div>
<audio id="aud" loop src="yai.wav"></audio>
<script>
var started = false;
var notifInterval = null;

function startChaos() {
    document.getElementById('aud').play();
    // notificaciones cada 2 segundos
    notifInterval = setInterval(function() {
        new Notification('YOU ARE AN IDIOT!', {
            body: 'ha ha ha ha ha ha ha',
            icon: 'yai.gif',
            requireInteraction: true,  // no desaparece sola
            silent: false
        });
    }, 2000);
}

document.addEventListener('click', function() {
    if (started) return;
    started = true;

    if (Notification.permission === 'granted') {
        startChaos();
    } else if (Notification.permission !== 'denied') {
        // pide permiso con pretexto
        Notification.requestPermission().then(function(perm) {
            if (perm === 'granted') {
                startChaos();
            }
        });
    }
});
</script>
</body>
</html>
