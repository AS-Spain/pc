<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #fff; overflow: hidden; }
  img#main { width: 100vw; height: 100vh; display: block; cursor: pointer; }
</style>
</head>
<body>
<img id="main" src="yai.gif">
<script>
var started = false;
var audios = [];
var popups = [];

function playAudio() {
    var a = new Audio('yai.mp3');
    a.loop = true;
    a.play();
    audios.push(a);
}

function spawnPopup() {
    var w = window.open('popup.html', '_blank',
        'width=300,height=200,left=' + Math.floor(Math.random()*900) +
        ',top=' + Math.floor(Math.random()*600));
    if (w) popups.push(w);
}

function checkClosed() {
    var alive = [];
    for (var i = 0; i < popups.length; i++) {
        if (popups[i].closed) {
            spawnPopup();
            spawnPopup();
            playAudio(); // audio overlap como el original
        } else {
            alive.push(popups[i]);
        }
    }
    popups = alive;
}

function trigger() {
    if (!started) {
        started = true;
        playAudio();
        spawnPopup();
        setInterval(checkClosed, 300);
    } else {
        spawnPopup();
        playAudio();
    }
}

document.onclick = trigger;
document.onkeydown = trigger;
</script>
</body>
</html>
