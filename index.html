<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; cursor: pointer; }
#main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg { from { background: white; } to { background: black; } }
#text { font-family: Arial; font-size: 36px; font-weight: bold; animation: col 0.1s infinite alternate; }
@keyframes col { from { color: red; } to { color: blue; } }
.f { font-size: 48px; animation: fl 0.1s infinite alternate; }
@keyframes fl { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="main">
    <div id="text">YOU ARE AN IDIOT!</div>
    <div><span class="f">&#9786;</span> <span class="f">&#9786;</span> <span class="f">&#9786;</span></div>
</div>
<audio id="aud" loop src="yai.wav"></audio>
<script>
var started = false;

document.addEventListener('click', function() {
    document.getElementById('aud').play();
    if (!started) {
        started = true;
        // primer click: abre en la ventana actual también
        // Chrome permite window.open dentro de click handler
        window.open('popup.html', '_blank', 'width=250,height=200,left=100,top=100');
        window.open('popup.html', '_blank', 'width=250,height=200,left=300,top=200');
        window.open('popup.html', '_blank', 'width=250,height=200,left=500,top=100');
    }
});

document.addEventListener('keydown', function() {
    document.getElementById('aud').play();
    window.open('popup.html', '_blank', 'width=250,height=200,left=' +
        Math.floor(Math.random()*800) + ',top=' + Math.floor(Math.random()*600));
});
</script>
</body>
</html>
